[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "B008",   # Allow glm.vec3() defaults (standard graphics pattern)
    "N806",   # Allow N, L, V, H in shading code (standard graphics notation)
    "E501",   # Allow longer lines (docstrings, help text)
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
