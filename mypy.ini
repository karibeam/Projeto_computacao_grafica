[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-src.*]
ignore_missing_imports = True

[mypy-pyglm.*]
ignore_missing_imports = True
ignore_errors = True

# Suppress pyglm type stub issues — glm.vec4(vec3, float) works at runtime
# but mypy's type stubs don't recognize this overload
[mypy-src.models.camera]
disable_error_code = call-overload

[mypy-src.models.geometry]
disable_error_code = call-overload

[mypy-src.services.coordinate]
disable_error_code = call-overload
